---
name: LiteLLM
version: 1.2.0
slug: litellm
description: OpenAI-compatible proxy for 100+ LLM providers
url: https://github.com/nishantapatil3/hassio-app-litellm
image: ghcr.io/nishantapatil3/hassio-apps/litellm
startup: services
init: true
webui: "http://[HOST]:[PORT:4000]/ui"
arch:
  - aarch64
  - amd64
ports:
  4000/tcp: 4000
ports_description:
  4000/tcp: LiteLLM Proxy API & Web UI
map:
  - config:rw
options:
  master_key: ""
  api_keys:
    - name: OPENAI_API_KEY
      value: ""
  environment_variables: []
  model_list:
    - model_name: gpt-4
      model: openai/gpt-4
      api_key_name: OPENAI_API_KEY
  general_settings:
    store_model_in_db: true
  litellm_settings:
    drop_params: true
    telemetry: false
  log_level: info
schema:
  master_key: password
  api_keys:
    - name: str
      value: password
  environment_variables:
    - name: str
      value: password
  model_list:
    - model_name: str
      model: str
      api_key_name: str?
      api_base: url?
  general_settings:
    store_model_in_db: bool?
  litellm_settings:
    drop_params: bool?
    telemetry: bool?
    num_retries: int(0,10)?
    request_timeout: int(1,600)?
  log_level: list(trace|debug|info|notice|warning|error|fatal)
