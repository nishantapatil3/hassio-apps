---
name: OpenClaw
version: 0.1.0
slug: openclaw
description: AI agent gateway with web UI by OpenClaw
url: https://github.com/nishantapatil3/hassio-apps
image: ghcr.io/nishantapatil3/openclaw
startup: services
init: true
webui: "http://[HOST]:[PORT:18789]"
arch:
  - aarch64
  - amd64
ports:
  18789/tcp: 18789
ports_description:
  18789/tcp: OpenClaw Gateway & Web UI
map:
  - config:rw
  - share:rw
options:
  gateway_token: ""
  gateway_bind: lan
  api_keys:
    - name: OPENAI_API_KEY
      value: ""
  litellm_base_url: ""
  litellm_api_key: ""
  litellm_model_name: ""
  timezone: America/Los_Angeles
schema:
  gateway_token: str
  gateway_bind: list(lan|loopback)
  api_keys:
    - name: list(OPENAI_API_KEY|ANTHROPIC_API_KEY|GEMINI_API_KEY|OPENROUTER_API_KEY|GOOGLE_API_KEY)
      value: password
  litellm_base_url: url?
  litellm_api_key: str?
  litellm_model_name: str?
  timezone: str
