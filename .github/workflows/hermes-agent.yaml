---
name: Build Hermes Agent

on:
  push:
    branches: [main]
    paths:
      - "hermes-agent/**"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hermes-agent

jobs:
  build:
    name: Build multi-platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from config.yaml
        id: version
        run: |
          version=$(grep '^version:' hermes-agent/config.yaml | awk '{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hermes-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            io.hass.name=Hermes Agent
            io.hass.description=Autonomous AI agent gateway by Nous Research
            io.hass.type=addon
            io.hass.version=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=hermes-agent
          cache-to: type=gha,mode=max,scope=hermes-agent
