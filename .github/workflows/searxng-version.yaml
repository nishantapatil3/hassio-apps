---
name: Update SearXNG Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional upstream searxng/searxng tag to pin"
        required: false
        type: string
  schedule:
    - cron: "17 9 * * *"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/searxng

jobs:
  update:
    name: Check upstream version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.update.outputs.changed }}
      version: ${{ steps.update.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update SearXNG version files
        id: update
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          args=()
          if [ -n "${REQUESTED_VERSION}" ]; then
            args+=(--version "${REQUESTED_VERSION}")
          fi
          python3 scripts/update-searxng-version.py "${args[@]}"

      - name: Commit version bump
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add searxng/config.yaml searxng/Dockerfile searxng/CHANGELOG.md
          git commit -m "Bump SearXNG to ${{ steps.update.outputs.version }}"
          git push

  build:
    name: Build updated image
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout updated main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./searxng
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.update.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            io.hass.name=SearXNG
            io.hass.description=Privacy-respecting metasearch engine
            io.hass.type=addon
            io.hass.version=${{ needs.update.outputs.version }}
          cache-from: type=gha,scope=searxng
          cache-to: type=gha,mode=max,scope=searxng
